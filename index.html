<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Craving Dishonoured</title>
    
    <!-- Native App Settings -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1533/1533913.png">
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        * { -webkit-tap-highlight-color: transparent; user-select: none; touch-action: manipulation; }
        body {
            margin: 0; padding: 0; background-color: #0f172a; color: white;
            font-family: -apple-system, system-ui, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; width: 100vw; overflow: hidden;
        }
        .container { display: flex; flex-direction: column; align-items: center; justify-content: space-around; height: 80%; width: 90%; }
        h1 { color: #94a3b8; font-size: 1.2rem; letter-spacing: 2px; margin: 0; }
        .stats { display: flex; gap: 15px; width: 100%; }
        .stat-box { 
            background: #1e293b; padding: 20px 10px; border-radius: 20px; 
            flex: 1; text-align: center; border: 1px solid #334155;
        }
        .value { display: block; font-size: 1.8rem; font-weight: 900; color: #22c55e; }
        .label { font-size: 0.65rem; color: #94a3b8; text-transform: uppercase; font-weight: bold; margin-top: 5px; }
        #dishonour-btn {
            background: linear-gradient(145deg, #ef4444, #b91c1c);
            color: white; border: none; width: 200px; height: 200px;
            font-size: 1.3rem; font-weight: 900; border-radius: 50%; cursor: pointer;
            box-shadow: 0 15px 35px rgba(239, 68, 68, 0.4);
            transition: transform 0.1s; display: flex; align-items: center; justify-content: center;
            text-align: center; padding: 20px;
        }
        #dishonour-btn:active { transform: scale(0.9); }
        .footer { font-size: 0.8rem; color: #475569; }
    </style>
</head>
<body>

    <div class="container">
        <h1>CRAVING DISHONOURED</h1>

        <div class="stats">
            <div class="stat-box">
                <span class="value" id="life">+0</span>
                <span class="label">Mins Gained</span>
            </div>
            <div class="stat-box">
                <span class="value" id="money">₹0</span>
                <span class="label">Saved</span>
            </div>
        </div>

        <button id="dishonour-btn">DISHONOUR<br>CRAVING</button>

        <p class="footer">Victory is the only option.</p>
    </div>

    <script>
        // 1. PRE-LOAD THE SOUND
        // Using a high-quality "Triumph/Success" sound
        const victorySound = new Audio('https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3');

        let lifeCount = parseInt(localStorage.getItem('lifeAdded')) || 0;
        let moneyCount = parseInt(localStorage.getItem('moneySaved')) || 0;

        const lifeEl = document.getElementById('life');
        const moneyEl = document.getElementById('money');

        lifeEl.innerText = "+" + lifeCount;
        moneyEl.innerText = "₹" + moneyCount;

        document.getElementById('dishonour-btn').addEventListener('click', () => {
            // PLAY SOUND
            victorySound.currentTime = 0; // Reset sound if tapped quickly
            victorySound.play();

            // CONFETTI
            confetti({ particleCount: 120, spread: 70, origin: { y: 0.7 } });

            // UPDATE DATA
            lifeCount += 7;
            moneyCount += 25;
            localStorage.setItem('lifeAdded', lifeCount);
            localStorage.setItem('moneySaved', moneyCount);

            // UPDATE UI
            lifeEl.innerText = "+" + lifeCount;
            moneyEl.innerText = "₹" + moneyCount;
            
            if (navigator.vibrate) { navigator.vibrate(70); }
        });
    </script>
</body>
</html>
