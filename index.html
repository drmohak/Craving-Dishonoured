<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Craving Dishonoured</title>
    <!-- Confetti Script -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            margin: 0; padding: 0; background-color: #0f172a; color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica;
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden;
        }
        h1 { color: #94a3b8; font-size: 1.5rem; margin-bottom: 2rem; }
        .stats { display: flex; gap: 20px; margin-bottom: 3rem; text-align: center; }
        .stat-box { background: #1e293b; padding: 15px; border-radius: 12px; min-width: 100px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .value { display: block; font-size: 1.4rem; font-weight: bold; color: #22c55e; margin-bottom: 5px; }
        .label { font-size: 0.7rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
        #dishonour-btn {
            background-color: #ef4444; color: white; border: none; padding: 25px 40px;
            font-size: 1.1rem; font-weight: 800; border-radius: 50px; cursor: pointer;
            box-shadow: 0 10px 20px rgba(239, 68, 68, 0.4); active-transform: scale(0.95); transition: 0.1s;
        }
        #dishonour-btn:active { transform: scale(0.95); }
        .footer { margin-top: 30px; font-size: 0.8rem; opacity: 0.4; }
    </style>
</head>
<body>

    <h1>CRAVING DISHONOURED</h1>

    <div class="stats">
        <div class="stat-box">
            <span class="value" id="life">+0</span>
            <span class="label">Mins Lived</span>
        </div>
        <div class="stat-box">
            <span class="value" id="money">₹0</span>
            <span class="label">Saved</span>
        </div>
    </div>

    <button id="dishonour-btn">DISHONOUR CRAVING</button>

    <p class="footer">Every victory counts.</p>

    <script>
        // Load existing data from phone memory
        let lifeCount = parseInt(localStorage.getItem('lifeAdded')) || 0;
        let moneyCount = parseInt(localStorage.getItem('moneySaved')) || 0;

        const lifeEl = document.getElementById('life');
        const moneyEl = document.getElementById('money');

        // Update the screen on start
        lifeEl.innerText = "+" + lifeCount;
        moneyEl.innerText = "₹" + moneyCount;

        document.getElementById('dishonour-btn').addEventListener('click', () => {
            // 1. Fire Confetti
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });

            // 2. Add numbers
            lifeCount += 7;
            moneyCount += 25;

            // 3. Save to phone memory
            localStorage.setItem('lifeAdded', lifeCount);
            localStorage.setItem('moneySaved', moneyCount);

            // 4. Update screen
            lifeEl.innerText = "+" + lifeCount;
            moneyEl.innerText = "₹" + moneyCount;
        });
    </script>
</body>
</html>
